<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Image Info Page</title>
	<style>
      body {
          margin: 0;
          font-family: 'DM Sans', sans-serif;
		      background: #f5f5f5;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
      }

      .card {
          background: white;
          border-radius: 16px;
          overflow: hidden;
          max-width: 900px;
          width: 90%;
          box-shadow: 0 10px 25px rgba(0,0,0,0.1);
          display: flex;
          flex-direction: column;
      }

      .card img {
          width: 100%;
          height: auto;
          display: block;
      }

      .content {
          padding: 20px;
      }

      .content h1 {
          margin: 0 0 10px;
          font-size: 1.8rem;
      }

      .content p {
          margin: 0 0 15px;
          color: #555;
          line-height: 1.5;
      }

      .content button {
          padding: 10px 16px;
          border: none;
          border-radius: 8px;
          background: #007BFF;
          color: white;
          cursor: pointer;
          font-size: 1rem;
      }

      .content button:hover {
          background: #0056b3;
      }

      /* Responsive layout for larger screens */
      @media (min-width: 768px) {
          .card {
              flex-direction: row;
          }

          .card img {
              width: 50%;
              height: 100%;
              object-fit: cover;
          }

          .content {
              width: 50%;
          }
      }
	</style>
</head>
<body>

<div class="card">
	<img src="images/thehaive-one-week.png" alt="Example Image" />
	<div class="content">
		<h1>A new chapter begins</h1>
		<p>
			For years, we’ve helped research teams collaborate, explore complex data, and support discovery. As AI continues to shape the future of science, we’re embracing what comes next. The HAIVE represents a new direction, a fresh identity, and a signal of what’s ahead.
		</p>
	</div>
</div>
</body>
</html>
